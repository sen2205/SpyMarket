services:
  - type: cron
    name: spymarket-watcher
    env: python
    schedule: "*/10 * * * *"   # 10分おきに実行
    buildCommand: |
      pip install -r requirements.txt
      python -m playwright install --with-deps chromium
    startCommand: cd scripts && python watcher.py 1
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: LINE_NOTIFY_TOKEN
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_ERROR_WEBHOOK_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/.cache/ms-playwright"
